<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Node Graph Analyzer</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --accent: #3b82f6;
  --accent2: #22c55e;
  --danger: #ef4444;
  --warn: #f59e0b;
  --text: #e6edf3;
  --muted: #8b949e;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 30px;
}

header {
  text-align: center;
  margin-bottom: 40px;
}

header h1 {
  font-size: 2.3rem;
  color: var(--text);
}

header p {
  color: var(--muted);
  margin-top: 8px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  color: var(--text);
  font-family: monospace;
  font-size: 0.95rem;
  min-height: 100px;
  resize: vertical;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-weight: 600;
  background: var(--surface);
  color: var(--text);
}

button:hover { background: #21262d; }

.primary { background: var(--accent); color: white; border: none; }
.primary:hover { background: #2563eb; }
.ghost { color: var(--muted); }

/* USER INFO */
.user-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 20px;
  font-size: 0.95rem;
  line-height: 2;
}
.user-card b { color: var(--muted); }
.user-card span { color: var(--text); font-weight: 600; }

/* SUMMARY */
.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.summary-card {
  background: var(--surface);
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  text-align: center;
}

.summary-card h2 { font-size: 1.8rem; color: var(--accent); }
.summary-card p  { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

/* TREE */
.tree {
  border-left: 4px solid var(--accent2);
  padding: 16px;
  margin-bottom: 12px;
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
}

.tree.cycle { border-left-color: var(--danger); }

.tree-root {
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 10px;
  color: var(--accent2);
}

.tree.cycle .tree-root { color: var(--danger); }

.visual {
  margin-top: 8px;
  font-family: monospace;
  font-size: 0.88rem;
  background: #0d1117;
  padding: 12px;
  border-radius: 6px;
  white-space: pre;
  overflow-x: auto;
  color: #a5d6ff;
  line-height: 1.6;
}

/* PILLS */
.pill {
  display: inline-block;
  padding: 5px 10px;
  margin: 4px;
  border-radius: 6px;
  font-size: 0.84rem;
  background: #21262d;
  font-family: monospace;
}

.invalid  { color: var(--danger); }
.dup      { color: var(--warn); }
.none-txt { color: var(--muted); font-size: 0.85rem; }

/* ERROR */
.error-card {
  background: var(--surface);
  border: 1px solid var(--danger);
  border-radius: 14px;
  padding: 18px 22px;
  color: var(--danger);
}
</style>
</head>

<body>

<header>
  <h1>Graph Hierarchy Analyzer</h1>
  <p>Advanced visualization of node relationships</p>
</header>

<div class="container">

  <div class="card">
    <textarea id="inputArea" placeholder="A->B, B->C, X->Y"></textarea>
    <div class="btn-row">
      <button class="primary" id="submitBtn">Analyze</button>
      <button class="ghost"   id="clearBtn">Clear</button>
    </div>
  </div>

  <div id="results"></div>

</div>

<script>

/* ── Escape HTML to prevent XSS ───────────────────────────────────────────── */
function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* ── Convert backend tree object → ASCII art ──────────────────────────────── */
/*
  Supports two shapes the backend might return:
    1. { name: "A", children: [ { name: "B", children: [] }, ... ] }
    2. { "A": { "B": {}, "C": {} } }   (plain nested object)
*/
function treeToAscii(node, prefix, isLast) {
  if (prefix  === undefined) prefix  = "";
  if (isLast  === undefined) isLast  = true;

  if (!node || typeof node !== "object") return String(node) + "\n";

  var label, kids;

  if ("name" in node) {
    // Shape 1
    label = node.name;
    kids  = node.children || [];
  } else {
    // Shape 2 — first key is root label
    label = Object.keys(node)[0];
    var val = node[label];
    kids = (val && typeof val === "object")
      ? Object.keys(val).map(function(k) { var o = {}; o[k] = val[k]; return o; })
      : [];
  }

  var connector   = prefix ? (isLast ? "└── " : "├── ") : "";
  var childPrefix = prefix + (prefix ? (isLast ? "    " : "│   ") : "");
  var result      = prefix + connector + label + "\n";

  kids.forEach(function(child, i) {
    result += treeToAscii(child, childPrefix, i === kids.length - 1);
  });

  return result;
}

/* ── Button events ────────────────────────────────────────────────────────── */

document.getElementById("clearBtn").onclick = function() {
  document.getElementById("inputArea").value   = "";
  document.getElementById("results").innerHTML = "";
};

document.getElementById("submitBtn").onclick = async function() {
  var raw = document.getElementById("inputArea").value.trim();

  if (!raw) {
    document.getElementById("results").innerHTML =
      '<div class="error-card">&#9888; Please enter some edges first.</div>';
    return;
  }

  var data = raw.split(/[\n,]+/).map(function(s){ return s.trim(); }).filter(Boolean);

  document.getElementById("results").innerHTML =
    '<div class="card" style="color:var(--muted);text-align:center;">Analyzing&hellip;</div>';

  try {
    var res = await fetch("/bfhl", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ data: data })
    });

    if (!res.ok) throw new Error("Server returned " + res.status);

    var d = await res.json();
    render(d);

  } catch (err) {
    document.getElementById("results").innerHTML =
      '<div class="error-card">&#9888; ' + esc(err.message) + '</div>';
  }
};

/* ── Render response ──────────────────────────────────────────────────────── */

function render(d) {
  var html = "";

  /* User info — pulled directly from the JSON the server returns */
  html += '<div class="user-card">';
  html += '<b>User: </b><span>'    + esc(d.user_id              || "-") + "</span><br>";
  html += '<b>Email: </b><span>'   + esc(d.email_id             || "-") + "</span><br>";
  html += '<b>Roll No: </b><span>' + esc(d.college_roll_number  || "-") + "</span>";
  html += "</div>";

  /* Summary */
  var s = d.summary || {};
  html += '<div class="summary">';
  html += '<div class="summary-card"><h2>' + esc(s.total_trees        || 0)   + "</h2><p>Trees</p></div>";
  html += '<div class="summary-card"><h2>' + esc(s.total_cycles       || 0)   + "</h2><p>Cycles</p></div>";
  html += '<div class="summary-card"><h2>' + esc(s.largest_tree_root  || "-") + "</h2><p>Largest Root</p></div>";
  html += "</div>";

  /* Hierarchies */
  var hierarchies = d.hierarchies || [];
  hierarchies.forEach(function(h) {
    var cycle = h.has_cycle || false;
    var ascii = cycle ? "⚠ Cycle detected" : treeToAscii(h.tree).trimEnd();

    html += '<div class="tree ' + (cycle ? "cycle" : "") + '">';
    html += '<div class="tree-root">' + esc(h.root) + (cycle ? " — CYCLE" : "") + "</div>";
    html += '<div class="visual">'    + esc(ascii)  + "</div>";
    html += "</div>";
  });

  /* Invalid entries */
  var invalid = d.invalid_entries || [];
  html += '<div class="card"><b>Invalid:</b><br>';
  if (invalid.length === 0) {
    html += '<span class="none-txt">None</span>';
  } else {
    invalid.forEach(function(i) { html += '<span class="pill invalid">' + esc(i) + "</span>"; });
  }
  html += "</div>";

  /* Duplicate edges */
  var dups = d.duplicate_edges || [];
  html += '<div class="card"><b>Duplicates:</b><br>';
  if (dups.length === 0) {
    html += '<span class="none-txt">None</span>';
  } else {
    dups.forEach(function(i) { html += '<span class="pill dup">' + esc(i) + "</span>"; });
  }
  html += "</div>";

  document.getElementById("results").innerHTML = html;
}

</script>
</body>
</html>
